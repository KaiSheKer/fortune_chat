<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理咨询助手</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>命理咨询助手</h1>
        </header>
        
        <main class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div class="content">
                        <p>您好！请提供您的生辰八字、性别、出生地等信息，我将为您解读命理。</p>
                        <p>例如：1990年8月15日 早上7点 男 北京</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="输入您的生辰八字、性别、出生地..." rows="1"></textarea>
                <button id="send-button" class="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="disclaimer">
                <p>免责声明：本服务仅供娱乐参考，不构成任何专业建议。</p>
            </div>
        </footer>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2>设置</h2>
            <button id="close-settings">×</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label for="api-key">API密钥</label>
                <input type="password" id="api-key" placeholder="输入您的API密钥">
            </div>
            <div class="setting-item">
                <label for="api-endpoint">API端点</label>
                <input type="text" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
            </div>
            <div class="setting-item">
                <label for="system-prompt">系统提示词</label>
                <textarea id="system-prompt" rows="5" placeholder="输入系统提示词..."></textarea>
            </div>
            <button id="save-settings" class="save-button">保存设置</button>
        </div>
    </div>

    <button id="settings-button" class="settings-button">
        <i class="fas fa-cog"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
