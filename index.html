<!DOCTYPE html>
<html lang="""zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生辰</title>
    <style>
        :root {
            --background: #000000;
            --foreground: #ffffff;
            --muted: #666666;
            --primary: #ffffff;
            --border: #333333;
            --input-bg: #111111;
            --user-bubble: #2563eb;
            --ai-bubble: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user .message-content {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background-color: var(--ai-bubble);
            color: var(--foreground);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        /* 示例提示区域样式 */
        .examples-container {
            margin-bottom: 16px;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .example-item {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .example-item:hover {
            background-color: var(--border);
        }

        .example-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--foreground);
        }

        .example-description {
            font-size: 12px;
            color: var(--muted);
        }

        .prompt-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .prompt-button {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--foreground);
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .prompt-button:hover {
            background-color: var(--border);
        }

        .input-wrapper {
            display: flex;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--foreground);
            font-size: 14px;
            padding: 8px;
            outline: none;
            resize: none;
            max-height: 200px;
            min-height: 24px;
        }

        .send-button {
            background-color: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
        }

        .send-button:disabled {
            color: var(--muted);
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>命理咨询助手</h1>
        </header>
        
        <main class="chat-container">
            <div class="messages" id="messages">
                <div class="message assistant">
                    <div class="avatar">
                        <i class="fas fa-user-astronaut"></i>
                    </div>
                    <div class="content">
                        <p>您好！请提供您的生辰八字、性别、出生地等信息，我将为您解读命理。</p>
                        <p>例如：1990年8月15日 早上7点 男 北京</p>
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="输入您的生辰八字、性别、出生地..." rows="1"></textarea>
                <button id="send-button" class="send-button">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="disclaimer">
                <p>免责声明：本服务仅供娱乐参考，不构成任何专业建议。</p>
            </div>
        </footer>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2>设置</h2>
            <button id="close-settings">×</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label for="api-key">API密钥</label>
                <input type="password" id="api-key" placeholder="输入您的API密钥">
            </div>
            <div class="setting-item">
                <label for="api-endpoint">API端点</label>
                <input type="text" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
            </div>
            <div class="setting-item">
                <label for="system-prompt">系统提示词</label>
                <textarea id="system-prompt" rows="5" placeholder="输入系统提示词..."></textarea>
            </div>
            <button id="save-settings" class="save-button">保存设置</button>
        </div>
    </div>

    <button id="settings-button" class="settings-button">
        <i class="fas fa-cog"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
