<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生辰</title>
    <style>
        :root {
            --background: #000000;
            --foreground: #ffffff;
            --muted: #666666;
            --primary: #ffffff;
            --border: #333333;
            --input-bg: #111111;
            --user-bubble: #2563eb;
            --ai-bubble: #262626;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--foreground);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.ai {
            align-self: flex-start;
        }

        .message-content {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user .message-content {
            background-color: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .ai .message-content {
            background-color: var(--ai-bubble);
            color: var(--foreground);
            border-bottom-left-radius: 4px;
        }

        .chat-input-container {
            padding: 16px;
            border-top: 1px solid var(--border);
        }

        /* 示例提示区域样式 */
        .examples-container {
            margin-bottom: 16px;
        }

        .examples-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .example-item {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .example-item:hover {
            background-color: var(--border);
        }

        .example-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            color: var(--foreground);
        }

        .example-description {
            font-size: 12px;
            color: var(--muted);
        }

        .prompt-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .prompt-button {
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--foreground);
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .prompt-button:hover {
            background-color: var(--border);
        }

        .input-wrapper {
            display: flex;
            background-color: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--foreground);
            font-size: 14px;
            padding: 8px;
            outline: none;
            resize: none;
            max-height: 200px;
            min-height: 24px;
        }

        .send-button {
            background-color: transparent;
            border: none;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
        }

        .send-button svg {
            width: 20px;
            height: 20px;
        }

        .send-button:disabled {
            color: var(--muted);
            cursor: not-allowed;
        }
        
        .loading-dots {
            display: inline-flex;
            align-items: center;
            height: 20px;
        }
        
        .loading-dots span {
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background-color: var(--muted);
            border-radius: 50%;
            display: inline-block;
            animation: dot-pulse 1.5s infinite ease-in-out;
        }
        
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes dot-pulse {
            0%, 100% {
                transform: scale(0.7);
                opacity: 0.5;
            }
            50% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
    <!-- 正确位置引入外部JS文件 -->
    <script src="scripts/script.js"></script>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>生辰</h2>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="message ai">
                <div class="message-content">
                    天机流转处，贵在知命顺天行，敢问缘主生于何年何月何日何时？天干地支定位，五行流转方显真机。
                </div>
            </div>
            <!-- 消息会动态添加到这里 -->
        </div>
        
        <div class="chat-input-container">
            <!-- 示例提示区域 -->
            <div class="examples-container">
                <div class="examples-grid">
                    <div class="example-item" data-prompt="生辰：2000年农历十月初十丑时，性别：男，出生地：广东省市广州市海珠区">
                        <div class="example-title">生辰：2000年农历十月初十丑时，性别：男，出生地：广东省市广州市海珠区</div>
                        <div class="example-description">生辰、性别、出生地</div>
                    </div>
                </div>
            </div>
            <div class="input-wrapper">
                <textarea class="chat-input" id="chat-input" placeholder="Send a message..." rows="1"></textarea>
                <button class="send-button" id="send-button" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chat-messages');
            const chatInput = document.getElementById('chat-input');
            const sendButton = document.getElementById('send-button');
            const promptButtons = document.querySelectorAll('.prompt-button');
            const exampleItems = document.querySelectorAll('.example-item');
            
            // API配置
            const API_CONFIG = {
                // API端点URL
                url: 'https://ark.cn-beijing.volces.com/api/v3/chat/completions',
                
                // API密钥 - 根据您使用的服务进行配置
                apiKey: 'Bearer 03bd97eb-2a5a-45a5-905d-08f404716aa8RE',
                
                // API提供商类型 (例如: 'openai', 'azure', 'anthropic', 'custom')
                provider: 'openai',
                
                // 模型名称 (例如: 'gpt-4', 'gpt-3.5-turbo', 'claude-2')
                model: 'gpt-4',
                
                // 系统提示词
                systemPrompt: `你是一位精通八字命理的大师，擅长解读生辰八字，分析命运走向。
                当用户提供生辰信息时，你需要根据信息进行专业的命理分析，包括八字命盘、五行属性、事业财运、婚姻情感等方面。
                请使用专业且易懂的语言，回答要有深度和洞察力。`
            };
            
            // 自动调整输入框高度
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
                
                // 启用/禁用发送按钮
                sendButton.disabled = this.value.trim() === '';
            });
            
            // 处理发送消息
            function sendMessage() {
                const message = chatInput.value.trim();
                if (message === '') return;
                
                // 添加用户消息
                addMessage(message, 'user');
                
                // 清空输入框并重置高度
                chatInput.value = '';
                chatInput.style.height = 'auto';
                sendButton.disabled = true;
                
                // 显示加载状态
                const loadingId = showLoadingIndicator();
                
                // 调用API获取回复
                fetchAIResponse(message)
                    .then(response => {
                        // 移除加载状态
                        removeLoadingIndicator(loadingId);
                        // 添加AI回复
                        addMessage(response, 'ai');
                    })
                    .catch(error => {
                        // 移除加载状态
                        removeLoadingIndicator(loadingId);
                        // 显示错误信息
                        addMessage("抱歉，服务器暂时无法响应，请稍后再试。", 'ai');
                        console.error('API调用失败:', error);
                    });
            }
            
            // 显示加载指示器
            function showLoadingIndicator() {
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'message ai';
                loadingDiv.id = 'loading-' + Date.now();
                
                const loadingContent = document.createElement('div');
                loadingContent.className = 'message-content';
                
                const loadingDots = document.createElement('div');
                loadingDots.className = 'loading-dots';
                loadingDots.innerHTML = '<span></span><span></span><span></span>';
                
                loadingContent.appendChild(loadingDots);
                loadingDiv.appendChild(loadingContent);
                chatMessages.appendChild(loadingDiv);
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                return loadingDiv.id;
            }
            
            // 移除加载指示器
            function removeLoadingIndicator(id) {
                const loadingDiv = document.getElementById(id);
                if (loadingDiv) {
                    loadingDiv.remove();
                }
            }
            
            // 调用API获取AI回复
            async function fetchAIResponse(userMessage) {
                try {
                    // 根据不同的API提供商构建请求
                    let requestBody;
                    let headers = {
                        'Content-Type': 'application/json'
                    };
                    
                    switch(API_CONFIG.provider) {
                        case 'openai':
                            headers['Authorization'] = `Bearer ${API_CONFIG.apiKey}`;
                            requestBody = {
                                model: API_CONFIG.model,
                                messages: [
                                    {
                                        role: 'system',
                                        content: API_CONFIG.systemPrompt
                                    },
                                    {
                                        role: 'user',
                                        content: userMessage
                                    }
                                ]
                            };
                            break;
                            
                        case 'azure':
                            headers['api-key'] = API_CONFIG.apiKey;
                            requestBody = {
                                messages: [
                                    {
                                        role: 'system',
                                        content: API_CONFIG.systemPrompt
                                    },
                                    {
                                        role: 'user',
                                        content: userMessage
                                    }
                                ]
                            };
                            break;
                            
                        case 'anthropic':
                            headers['x-api-key'] = API_CONFIG.apiKey;
                            requestBody = {
                                model: API_CONFIG.model,
                                prompt: `${API_CONFIG.systemPrompt}\n\nHuman: ${userMessage}\n\nAssistant:`,
                                max_tokens_to_sample: 1000
                            };
                            break;
                            
                        case 'custom':
                        default:
                            // 自定义API格式
                            headers['Authorization'] = `Bearer ${API_CONFIG.apiKey}`;
                            requestBody = {
                                system: API_CONFIG.systemPrompt,
                                user: userMessage
                            };
                            break;
                    }
                    
                    const response = await fetch(API_CONFIG.url, {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify(requestBody)
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    // 根据不同的API提供商解析响应
                    let aiResponse;
                    
                    switch(API_CONFIG.provider) {
                        case 'openai':
                            aiResponse = data.choices[0].message.content;
                            break;
                            
                        case 'azure':
                            aiResponse = data.choices[0].message.content;
                            break;
                            
                        case 'anthropic':
                            aiResponse = data.completion;
                            break;
                            
                        case 'custom':
                        default:
                            aiResponse = data.response || data.message || data.content || "无法解析API响应";
                            break;
                    }
                    
                    return aiResponse;
                } catch (error) {
                    console.error('API调用出错:', error);
                    // 如果API调用失败，使用备用回复
                    return generateFallbackResponse(userMessage);
                }
            }
            
            // 备用回复生成（当API调用失败时使用）
            function generateFallbackResponse(userMessage) {
                if (userMessage.includes("生辰")) {
                    // 解析生辰信息
                    const birthYear = userMessage.match(/\d{4}年/) ? userMessage.match(/\d{4}年/)[0].replace('年', '') : "未知";
                    const gender = userMessage.includes("性别：男") ? "男" : userMessage.includes("性别：女") ? "女" : "未知";
                    
                    return `根据您提供的生辰信息，您出生于${birthYear}年，性别为${gender}。\n\n您的八字命盘显示，您具有较强的${gender === "男" ? "阳刚" : "阴柔"}之气，五行属性偏向于${Math.random() > 0.5 ? "金水" : "木火"}。在事业上，您适合从事${Math.random() > 0.5 ? "创新型" : "稳定型"}工作。`;
                } else if (userMessage.includes("命运") || userMessage.includes("运势")) {
                    return `您的命运走向受到天时地利人和的影响，近期运势${Math.random() > 0.5 ? "上升" : "平稳"}。建议您顺应天时，把握机遇，方能事半功倍。`;
                } else {
                    return "感谢您的咨询。为了给您提供更准确的解读，请提供您的生辰八字信息（出生年月日时）、性别和出生地，格式如：生辰：2000年农历十月初十丑时，性别：男，出生地：广东省广州市。";
                }
            }
            
            // 添加消息到聊天区域
            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                
                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';
                messageContent.textContent = text;
                
                messageDiv.appendChild(messageContent);
                chatMessages.appendChild(messageDiv);
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 发送按钮点击事件
            sendButton.addEventListener('click', sendMessage);
            
            // 按Enter发送消息（Shift+Enter换行）
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            // 提示按钮点击事件
            promptButtons.forEach(button => {
                button.addEventListener('click', function() {
                    const promptText = this.getAttribute('data-prompt');
                    chatInput.value = promptText;
                    chatInput.focus();
                    
                    // 触发input事件以更新高度和启用发送按钮
                    const event = new Event('input', {
                        bubbles: true,
                        cancelable: true,
                    });
                    chatInput.dispatchEvent(event);
                    
                    // 将光标移到文本末尾
                    chatInput.setSelectionRange(promptText.length, promptText.length);
                });
            });
            
            // 示例项点击事件
            exampleItems.forEach(item => {
                item.addEventListener('click', function() {
                    const promptText = this.getAttribute('data-prompt');
                    chatInput.value = promptText;
                    chatInput.focus();
                    
                    // 触发input事件以更新高度和启用发送按钮
                    const event = new Event('input', {
                        bubbles: true,
                        cancelable: true,
                    });
                    chatInput.dispatchEvent(event);
                    
                    // 将光标移到文本末尾
                    chatInput.setSelectionRange(promptText.length, promptText.length);
                });
            });
            
            // 添加自定义提示模板的功能
            function addCustomPrompt(text, label) {
                const promptsContainer = document.querySelector('.prompt-buttons');
                if (!promptsContainer) return;
                
                const newPrompt = document.createElement('button');
                newPrompt.className = 'prompt-button';
                newPrompt.setAttribute('data-prompt', text);
                newPrompt.textContent = label;
            
                newPrompt.addEventListener('click', function() {
                    chatInput.value = text; // 设置输入框内容
                    
                    // 触发input事件
                    const event = new Event('input', {
                        bubbles: true,
                        cancelable: true,
                    });
                    chatInput.dispatchEvent(event);
                    
                    // 将光标移到文本末尾
                    chatInput.setSelectionRange(text.length, text.length);
                });
            
                promptsContainer.appendChild(newPrompt);
            }
            
            // 添加自定义示例项的功能
            function addCustomExample(title, description, promptText) {
                const examplesGrid = document.querySelector('.examples-grid');
                const newExample = document.createElement('div');
                newExample.className = 'example-item';
                newExample.setAttribute('data-prompt', promptText);
                
                const titleDiv = document.createElement('div');
                titleDiv.className = 'example-title';
                titleDiv.textContent = title;
                
                const descDiv = document.createElement('div');
                descDiv.className = 'example-description';
                descDiv.textContent = description;
                
                newExample.appendChild(titleDiv);
                newExample.appendChild(descDiv);
                
                newExample.addEventListener('click', function() {
                    chatInput.value = this.getAttribute('data-prompt');
                    chatInput.focus();
                    const event = new Event('input', {
                        bubbles: true,
                        cancelable: true,
                    });
                    chatInput.dispatchEvent(event);
                    chatInput.setSelectionRange(promptText.length, promptText.length);
                });
                
                examplesGrid.appendChild(newExample);
            }
            
        });
    </script>
</body>
</html>
